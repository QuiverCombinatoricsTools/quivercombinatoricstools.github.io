name: documentation

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: sagemath/sagemath:latest
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y \
            tzdata \
            git \
            make \
            fonts-freefont-otf \
            xindy \
            python3-sphinx

          sage --pip install git+https://github.com/QuiverTools/QuiverTools.git

          sage --pip install sphinx
          sage --pip install sphinx-book-theme
          sage --pip install dot2tex

          cd /tmp/build && rm -rf .git
          sage --pip install .

      - name: Build documentation
        run: |
          cd docs
          sage -sh -c "make html"

      - name: Prepare Pages artifact
        run: |
          rm -rf pages
          mkdir -p pages

          cp -a docs/_build/html/. pages/
          touch pages/.nojekyll

          echo "Pages contents:"
          ls -R pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
